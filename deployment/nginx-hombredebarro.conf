# /etc/nginx/sites-available/hombredebarro.com
# Symlink to sites-enabled and reload nginx after editing.

# ── HTTP → HTTPS redirect ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name hombredebarro.com www.hombredebarro.com;
    return 301 https://hombredebarro.com$request_uri;
}

# ── HTTPS site ───────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hombredebarro.com www.hombredebarro.com;

    # Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/hombredebarro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hombredebarro.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Larger uploads (architects upload high-res photos)
    client_max_body_size 25M;

    # ── Strapi admin panel ───────────────────────────────────────
    location /admin {
        proxy_pass http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js webhook endpoint must win over the generic Strapi /api route.
    location = /api/revalidate {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── Strapi public API (permissions are enforced by Strapi) ───
    location /api {
        proxy_pass http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── Strapi uploads (images, PDFs) ────────────────────────────
    location /uploads {
        proxy_pass http://127.0.0.1:1337;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Internal Strapi assets (built admin panel JS/CSS)
    location ~ ^/(admin|content-manager|content-type-builder|email|i18n|upload|users-permissions)/ {
        proxy_pass http://127.0.0.1:1337;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── Static Next.js assets — long-term cacheable ──────────────
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /_next/image {
        proxy_pass http://127.0.0.1:3000;
        expires 60d;
    }

    # ── Next.js frontend (default) ───────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}
